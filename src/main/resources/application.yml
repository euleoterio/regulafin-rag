spring:
  application:
    name: regulafin-assistant

  datasource:
    url: jdbc:postgresql://localhost:5432/regulafin
    username: regulafin
    password: regulafin

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
      embedding:
        options:
          model: text-embedding-3-small
    vectorstore:
      pgvector:
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        initialize-schema: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info